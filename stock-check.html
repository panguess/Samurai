<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ซามูไรไส้กรอก — เช็คสต๊อก & สั่งของ</title>
<link rel="apple-touch-icon" href="/icon-192-black.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192-black.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root{
    --brand:#1A1A1A; --brand-bg:#ECECEA;
    --cream:#FCF9F2;
    --bg:#F1EFE8;
    --text:#2C2C2A; --text-secondary:#5F5E5A; --text-tertiary:#888780;
    --border:rgba(44,44,42,0.12); --border-strong:rgba(44,44,42,0.22);
    --radius-md:8px; --radius-lg:12px;
    --green:#085041; --green-bg:#E1F5EE;
    --amber:#854F0B; --amber-bg:#FAEEDA; --amber-mid:#EF9F27;
    --purple:#3C3489; --purple-bg:#EEEDFE;
    --pink:#993556; --pink-bg:#FBEAF0;
    --danger:#A32D2D; --danger-bg:#FCEBEB;
  }
  *{box-sizing:border-box;}
  body{font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); margin:0; -webkit-font-smoothing:antialiased;}
  #app{max-width:600px; margin:0 auto; min-height:100vh; background:var(--cream); display:flex; flex-direction:column;}
  .topbar{background:var(--brand); color:var(--cream); padding:14px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10;}
  .topbar h1{font-size:16px; font-weight:600; margin:0; flex:1;}
  .topbar .back{cursor:pointer; font-size:18px; background:none; border:none; color:var(--cream); padding:4px;}
  .topbar .meta{font-size:13px; opacity:0.9;}
  .content{flex:1; padding:14px; padding-bottom:80px;}
  button{font-family:inherit;}
  .btn{border:1px solid var(--border-strong); background:var(--cream); color:var(--text); border-radius:var(--radius-md); padding:9px 14px; font-size:13px; cursor:pointer;}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--brand); color:var(--cream); border:none; font-weight:600;}
  .btn-block{width:100%; padding:12px; font-size:14px;}
  input[type=text], input[type=number], input[type=password], select{
    font-family:inherit; font-size:14px; border:1px solid var(--border-strong); border-radius:var(--radius-md);
    padding:8px 10px; width:100%; background:#fff; color:var(--text);
  }
  input:focus, select:focus{outline:2px solid var(--brand); outline-offset:1px;}
  table{border-collapse:collapse;}

  /* employee: supplier list */
  .progress-track{height:6px; background:var(--bg); border-radius:8px; overflow:hidden; margin:10px 0 14px;}
  .progress-fill{height:100%; background:var(--cream); opacity:0.8; border-radius:8px;}
  .sup-row{display:flex; align-items:center; gap:10px; padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius-md); margin-bottom:6px; cursor:pointer; background:#fff;}
  .sup-row.done{opacity:0.5;}
  .sup-thumb{width:44px; height:44px; border-radius:var(--radius-md); background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--text-tertiary); font-size:18px; flex-shrink:0;}
  .sup-row p{margin:0; font-size:14px; font-weight:500; flex:1;}
  .section-label{font-size:13px; color:var(--text-secondary); margin:14px 0 6px; font-weight:500;}

  /* employee: stock check grid */
  .prod-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .prod-card{border-radius:16px; padding:10px; border:2px solid var(--border);}
  .prod-card.checked{background:#EAF3DE; border-color:#639922;}
  .prod-photo-area{position:relative; width:100%; aspect-ratio:1/1; border-radius:12px; overflow:hidden; margin-bottom:8px; display:flex; align-items:center; justify-content:center;}
  .prod-photo-area.no-photo{cursor:pointer;}
  .prod-photo-area img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-placeholder{display:flex; flex-direction:column; align-items:center; gap:5px;}
  .photo-placeholder span{font-size:11px; color:var(--text-tertiary);}
  .prod-photo-area .check-toggle{position:absolute; top:6px; right:6px; background:rgba(255,255,255,0.9); border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; color:var(--text-tertiary); border:none; padding:0;}
  .retake-badge{position:absolute; top:6px; left:6px; background:rgba(255,255,255,0.9); border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text-tertiary); pointer-events:none;}
  .prod-card.checked .check-toggle{color:#3B6D11;}
  .prod-card-name{font-size:12.5px; font-weight:500; margin:0 0 8px;}
  .unit-stepper{display:flex; align-items:center; gap:4px; background:#fff; border-radius:var(--radius-md); padding:4px 6px; margin-bottom:6px;}
  .prod-card.checked .unit-stepper{background:rgba(255,255,255,0.7);}
  .step-btn{width:24px; height:24px; border-radius:50%; background:var(--brand); color:var(--cream); border:none; font-size:13px; flex-shrink:0; cursor:pointer; line-height:1;}
  .step-input{width:28px; text-align:center; border:none; background:transparent; font-size:12.5px; padding:0;}
  .unit-tag{font-size:10px; color:var(--text-secondary); margin-left:auto;}
  .stickybar{position:sticky; bottom:0; background:var(--brand); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; margin:14px -14px -80px; gap:10px;}
  .stickybar span{color:var(--cream); font-size:13px;}
  .stickybar .btn-primary{background:var(--cream); color:var(--brand);}

  /* owner */
  .nav-tile{background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px; cursor:pointer; display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .nav-tile.featured{border:2px solid var(--brand);}
  .nav-tile p{margin:0; font-weight:500; font-size:14px;}
  .nav-tile small{color:var(--text-secondary); font-size:12px;}
  .tabs{display:flex; gap:6px; margin-bottom:14px;}
  .tab{border:1px solid var(--border-strong); background:#fff; border-radius:var(--radius-md); padding:6px 13px; font-size:13px; cursor:pointer;}
  .tab.active{background:var(--brand); color:var(--cream); border-color:var(--brand);}
  .metric-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
  .metric{background:var(--bg); border-radius:var(--radius-md); padding:9px;}
  .metric p:first-child{font-size:12px; color:var(--text-secondary); margin:0 0 4px;}
  .metric p:last-child{font-size:19px; font-weight:600; margin:0;}
  .sup-header{padding:7px 10px; border-radius:0; margin:0; border-left:3px solid; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; position:sticky; top:48px; z-index:3;}
  .badge{font-size:11px; padding:2px 8px; border-radius:6px; font-weight:500; display:inline-block;}
  .empty-state{text-align:center; color:var(--text-secondary); font-size:13px; padding:30px 0;}
  .copy-toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:8px 16px; border-radius:8px; font-size:13px; z-index:60;}

  /* accordion order rows */
  .acc-group{border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius-lg) var(--radius-lg); overflow:hidden; margin-bottom:14px;}
  .select-all-row{padding:8px 10px; background:#fcfcfa; border-bottom:1px solid var(--border);}
  .link-btn{background:none; border:none; padding:0; font-family:inherit; font-size:11.5px; font-weight:600; color:var(--text-secondary); cursor:pointer;}
  .link-btn:active{opacity:0.6;}
  .prow{display:flex; flex-direction:column; gap:7px; padding:9px 10px; border-bottom:1px solid var(--border); background:#fff;}
  .prow:last-child{border-bottom:none;}
  .prow.low{background:var(--danger-bg);}
  .prow-top{display:flex; align-items:center; gap:9px;}
  .prow-bottom{display:flex; align-items:center; gap:6px;}
  .prow input[type=checkbox]{flex-shrink:0; width:17px; height:17px;}
  .prow-name{flex:1; min-width:0; font-size:13px; color:var(--text); line-height:1.3;}
  .prow.low .prow-name{font-weight:600;}
  .stat{display:flex; flex-direction:column; align-items:flex-end; min-width:38px;}
  .stat .lbl{font-size:8.5px; color:var(--text-tertiary); font-weight:600; line-height:1.3;}
  .stat .v{font-size:13px; font-weight:700; color:var(--text); line-height:1.2;}
  .stat .v .u{font-size:9px; font-weight:500; margin-left:1px;}
  .stat .v.muted{color:var(--text-tertiary); font-weight:500;}
  .stat.danger .lbl, .stat.danger .v{color:var(--danger);}
  .stepper{display:flex; align-items:center; border:1px solid var(--border-strong); border-radius:8px; overflow:hidden; background:#fff; flex-shrink:0; margin-left:auto;}
  .stepper button{width:26px; height:28px; border:none; background:var(--bg); color:var(--text); font-size:14px; cursor:pointer; flex-shrink:0;}
  input.stepper-input{width:36px; flex-shrink:0; text-align:center; border:none; border-left:1px solid var(--border); border-right:1px solid var(--border); font-size:13px; font-weight:700; padding:5px 0;}

  /* order overview + collapsible supplier cards */
  .stat-strip{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px;}
  .stat-card{background:#fff; border:1px solid var(--border); border-radius:var(--radius-md); padding:9px 6px; text-align:center;}
  .stat-card .n{font-size:19px; font-weight:700; line-height:1.1;}
  .stat-card .lbl{font-size:10.5px; color:var(--text-tertiary); margin-top:2px; line-height:1.2;}
  .stat-card.danger .n{color:var(--danger);}
  .stat-card.green .n{color:var(--green);}
  .stat-card.amber .n{color:var(--amber);}
  .ord-card{border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:10px; overflow:hidden; background:#fff;}
  .ord-card-head{display:flex; align-items:center; gap:10px; padding:12px; cursor:pointer; background:var(--brand-bg);}
  .ord-card-head .chev{font-size:14px; color:var(--text-tertiary); transition:transform .15s; flex-shrink:0;}
  .ord-card.open .ord-card-head .chev{transform:rotate(180deg);}
  .ord-card-name{font-weight:600; font-size:14.5px; flex:1; min-width:0;}
  .sup-badges{display:grid; grid-template-columns:82px 108px; gap:5px; flex-shrink:0;}
  .sup-badges .badge{text-align:center; white-space:nowrap;}
  .badge.checked{background:var(--green-bg); color:var(--green);}
  .badge.unchecked{background:var(--danger-bg); color:var(--danger);}
  .badge.needorder{background:var(--danger-bg); color:var(--danger);}
  .badge.ordered{background:var(--green-bg); color:var(--green);}
  .badge.noorder{background:var(--brand-bg); color:var(--text-tertiary); border:1px solid var(--border-strong);}
  .badge.pending{background:transparent; color:var(--text-tertiary); border:1px dashed var(--border-strong);}
  .ord-card-body{display:none; border-top:1px solid var(--border);}
  .ord-card.open .ord-card-body{display:block;}
  .sup-order-btn-row{padding:8px 10px; display:flex; justify-content:flex-end;}

  /* playful redesign additions */
  .hero{background:var(--brand); padding:1.8rem 1.5rem 1rem; text-align:center;}
  .hero-logo{width:180px; max-width:70vw; height:auto; display:block; margin:0 auto 6px;}
  .hero-left{display:flex; align-items:center; gap:12px;}
  .hero-date{text-align:right; flex-shrink:0;}
  .hero-date strong{display:block; font-size:13px; font-weight:600; color:rgba(252,249,242,0.7);}
  .hero-date span{font-size:11px; color:rgba(252,249,242,0.38);}
  .role-label{font-size:10.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); margin:18px 0 9px 2px; display:flex; align-items:center; gap:7px;}
  .role-label::after{content:''; flex:1; height:1px; background:var(--border-strong);}
  .action-card{display:flex; align-items:center; gap:16px; padding:22px 20px; border-radius:16px; border:1px solid var(--border-strong); background:#fff; cursor:pointer; margin-bottom:10px; -webkit-tap-highlight-color:transparent; box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .action-card.primary{background:var(--brand); border-color:transparent;}
  .action-card.primary .act-title{color:var(--cream);}
  .action-card.primary .act-sub{color:rgba(252,249,242,0.45);}
  .action-card.primary .act-chev{color:rgba(252,249,242,0.3);}
  .action-card.bill{background:#FEF3DF; border-color:rgba(122,70,8,0.16);}
  .action-card.bill .act-title{color:#7A4608;}
  .action-card.bill .act-sub{color:rgba(122,70,8,0.6);}
  .action-card.bill .act-chev{color:rgba(122,70,8,0.3);}
  .act-icon{width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:37.5px; flex-shrink:0;}
  .act-body{flex:1;}
  .act-title{font-size:22.5px; font-weight:700; color:var(--text); margin-bottom:4px;}
  .act-sub{font-size:15px; color:var(--text-tertiary); line-height:1.4; opacity:0.75;}
  .act-chev{font-size:22px; color:var(--text-tertiary); flex-shrink:0; opacity:0.35;}
  .icon-card{display:flex; align-items:center; gap:13px; background:#fff; border:0.5px solid var(--border); border-radius:14px; padding:13px; margin-bottom:9px; cursor:pointer;}
  .icon-box{width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .pick-row{display:flex; align-items:center; gap:13px; background:#fff; border:0.5px solid var(--border); border-radius:16px; padding:10px 14px; margin-bottom:9px; cursor:pointer;}
  .pick-avatar{width:48px; height:48px; border-radius:50%; border:2px solid var(--text); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .sup-card-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .sup-card{display:flex; flex-direction:column; align-items:center; gap:8px; background:#fff; border:0.5px solid var(--border); border-radius:16px; padding:14px 8px; text-align:center; cursor:pointer;}
  .sup-card.done{opacity:0.55;}
  .sup-icon{width:42px; height:42px; border-radius:13px; border:2px solid var(--text); display:flex; align-items:center; justify-content:center;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============ LIVE API CONFIG ============ */
const API_URL = 'https://script.google.com/macros/s/AKfycbytmWrmwrjZQjeUUW1o6CpHZmr5lFAxZJISyvqoyD5hM2TmIABUVfPuqnXseF4-nmw9/exec';

async function apiGet(action, params){
  const qs = new URLSearchParams({action, ...(params||{})}).toString();
  const res = await fetch(`${API_URL}?${qs}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}
async function apiPost(action, payload){
  const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({action, ...payload}) });
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

/* ============ LIVE DATA (filled by bootstrap()) ============ */
let SUPPLIERS = [];
let PRODUCTS = [];
let STAFF = [];
let stockValues = {};       // unitId -> remain qty (today)
let productPhotos = {};     // productId -> compressed dataURL (session, sent with saveStock)
// TEMPORARY: keep the camera button available even after a product already has a
// photo, so photos can be retaken/corrected during the initial rollout period.
// Flip this to false (or remove) once the reference photos are considered final.
const ALLOW_PHOTO_RETAKE = true;

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h){ if(w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; } }
        else { if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
let checkedSuppliers = new Set();
function todayKey(){ return new Date().toLocaleDateString('en-CA'); } // YYYY-MM-DD, local time
function loadSessionChecked(){
  try{
    const raw = JSON.parse(localStorage.getItem('sessionCheckedSuppliers')||'{}');
    if(raw.date === todayKey() && Array.isArray(raw.ids)) return new Set(raw.ids);
  }catch(e){}
  return new Set();
}
function saveSessionChecked(){
  try{ localStorage.setItem('sessionCheckedSuppliers', JSON.stringify({date: todayKey(), ids:[...sessionCheckedSuppliers]})); }catch(e){}
}
let sessionCheckedSuppliers = loadSessionChecked(); // grows-only, never reset during session (persisted per day so a page reload doesn't lose it)
function loadSessionOrdered(){
  try{
    const raw = JSON.parse(localStorage.getItem('sessionOrderedSuppliers')||'{}');
    if(raw.date === todayKey() && Array.isArray(raw.ids)) return new Set(raw.ids);
  }catch(e){}
  return new Set();
}
function saveSessionOrdered(){
  try{ localStorage.setItem('sessionOrderedSuppliers', JSON.stringify({date: todayKey(), ids:[...orderedSuppliers]})); }catch(e){}
}
let orderedSuppliers = loadSessionOrdered(); // suppliers already ordered today, resets daily like sessionCheckedSuppliers
let checkedProducts = new Set();
let stockStatusCache = null;
let _stockStatusTs = 0;
const STOCK_STATUS_TTL = 8000; // ms - avoid refetching the whole sheet on every screen hop
async function getStockStatus(force){
  if(!force && stockStatusCache && (Date.now() - _stockStatusTs) < STOCK_STATUS_TTL) return stockStatusCache;
  const data = await apiGet('stockStatus');
  stockStatusCache = data; _stockStatusTs = Date.now();
  return data;
}
function invalidateStockStatus(){ stockStatusCache = null; _stockStatusTs = 0; }
function patchStockStatusChecked(products, items){
  // After a successful saveStock, update the cache in place instead of
  // invalidating it, so the next screen doesn't have to wait on another
  // full round-trip just to show what we already know was just saved.
  if(!stockStatusCache) return;
  const remainByUnit = {}; items.forEach(it=>{ remainByUnit[it.unitId] = it.remainQty; });
  products.forEach(p=>{
    let entry = stockStatusCache.find(s=>s.productId===p.id);
    if(!entry){ entry = {productId:p.id, checked:false, remain:{}}; stockStatusCache.push(entry); }
    entry.checked = true;
    entry.remain = entry.remain || {};
    p.units.forEach(u=>{ if(remainByUnit[u.id]!==undefined) entry.remain[u.id] = remainByUnit[u.id]; });
  });
  _stockStatusTs = Date.now();
}
let FORECASTS = {};         // productId -> {forecast, safetyStock, currentStock, rateUsed, unitLabel}


/* ============ STATE / ROUTER ============ */
let state = { screen:'home', staffName:'', currentSupplierId:null, ownerTab:'stock', orderQty:{} };
const NEUTRAL_COL = {bg:'var(--bg)', text:'var(--text-secondary)'};
const ICON_PALETTE = [
  {bg:'#FAEEDA', fg:'#854F0B'}, {bg:'#FBEAF0', fg:'#993556'},
  {bg:'#E1F5EE', fg:'#085041'}, {bg:'#EEEDFE', fg:'#3C3489'},
];
function iconColor(idx){ return ICON_PALETTE[idx % ICON_PALETTE.length]; }
function go(screen, extra, opts){
  state.screen = screen; Object.assign(state, extra||{});
  const snapshot = { screen: state.screen, staffName: state.staffName, currentSupplierId: state.currentSupplierId, ownerTab: state.ownerTab };
  if(opts && opts.replace){ history.replaceState(snapshot, ''); }
  else { history.pushState(snapshot, ''); }
  render();
}
window.addEventListener('popstate', (e)=>{
  if(e.state){ Object.assign(state, e.state); } else { state.screen = 'home'; }
  render();
});

function renderLoading(app, msg){
  app.innerHTML = `<div class="empty-state" style="padding:80px 0;"><div style="font-size:30px; margin-bottom:10px;">⏳</div><p>${msg||'กำลังโหลดข้อมูล...'}</p></div>`;
}

async function bootstrap(){
  const app = document.getElementById('app');
  // Show the logo immediately instead of a blank spinner - the network
  // round trip to Apps Script is the slow part, not this render.
  app.innerHTML = '';
  app.appendChild(buildHero());
  const loadingEl = document.createElement('div');
  loadingEl.className = 'content';
  loadingEl.innerHTML = `<div class="empty-state" style="padding:40px 0;"><div style="font-size:30px; margin-bottom:10px;">⏳</div><p>กำลังโหลดข้อมูลร้าน...</p></div>`;
  app.appendChild(loadingEl);
  try{
    const data = await apiGet('bootstrap');
    SUPPLIERS = data.suppliers; PRODUCTS = data.products; STAFF = data.staff;
    getStockStatus().catch(()=>{});
    history.replaceState({screen:'home', staffName:'', currentSupplierId:null, ownerTab:'stock'}, '');
    render();
  }catch(err){
    loadingEl.innerHTML = `<div class="empty-state" style="padding:40px 14px; color:var(--danger);">โหลดข้อมูลไม่สำเร็จ: ${err.message}<br><br><button class="btn" onclick="bootstrap()">ลองใหม่</button></div>`;
  }
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const map = {
    home: renderHome, staffName: renderStaffName, supplierList: renderSupplierList,
    supplierCheck: renderSupplierCheck, staffDone: renderStaffDone,
    ownerMenu: renderOwnerMenu, ownerPin: renderOwnerPin, ownerStockAnalytics: renderOwnerStockAnalytics,
    orderPage: renderOrderPage, orderMessage: renderOrderMessage,
  };
  (map[state.screen] || renderHome)(app);
}

function topbar(title, opts={}){
  const bar = document.createElement('div'); bar.className='topbar';
  if(opts.back){ const b=document.createElement('button'); b.className='back'; b.innerHTML='←'; b.onclick=opts.back; bar.appendChild(b); }
  const h = document.createElement('h1'); h.textContent = title; bar.appendChild(h);
  if(opts.meta){ const m=document.createElement('span'); m.className='meta'; m.textContent=opts.meta; bar.appendChild(m); }
  return bar;
}

function renderHome(app){
  const hero = buildHero();
  app.appendChild(hero);
  const _now = new Date();
  const _days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  const _months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const c = document.createElement('div'); c.className='content';
  c.innerHTML = `
    <div class="role-label">พนักงาน</div>
    <div class="action-card primary" id="goStaff">
      <div class="act-icon" style="background:rgba(255,255,255,0.12);"><i class="ti ti-clipboard-list" style="color:rgba(252,249,242,0.85);" aria-hidden="true"></i></div>
      <div class="act-body"><div class="act-title">เช็คของวันนี้</div><div class="act-sub">นับสต๊อกและบันทึกของที่เหลือ</div></div>
      <i class="ti ti-chevron-right act-chev" aria-hidden="true"></i>
    </div>
    <div class="action-card bill" id="goBill">
      <div class="act-icon" style="background:rgba(122,70,8,0.12);"><i class="ti ti-camera" style="color:#7A4608;" aria-hidden="true"></i></div>
      <div class="act-body"><div class="act-title">รับของ — ถ่ายบิล</div><div class="act-sub">บันทึกต้นทุนของที่ซัพพลายเออร์ส่งมา</div></div>
      <i class="ti ti-chevron-right act-chev" aria-hidden="true"></i>
    </div>
    <div class="role-label" style="margin-top:6px;">เจ้าของร้าน</div>
    <div class="action-card" id="goOwner">
      <div class="act-icon" style="background:var(--bg);"><i class="ti ti-layout-dashboard" style="color:var(--text);" aria-hidden="true"></i></div>
      <div class="act-body"><div class="act-title">จัดการร้าน</div><div class="act-sub">สั่งของ · ดูสต๊อก · วิเคราะห์ยอด</div></div>
      <i class="ti ti-chevron-right act-chev" aria-hidden="true"></i>
    </div>
  `;
  app.appendChild(c);
  c.querySelector('#goStaff').onclick = ()=>go('staffName');
  c.querySelector('#goOwner').onclick = ()=>go('ownerPin');
  c.querySelector('#goBill').onclick = ()=>alert('ฟีเจอร์นี้กำลังพัฒนา 🚧');
}

/* ============ STAFF: choose name ============ */
function renderStaffName(app){
  app.appendChild(topbar('เลือกชื่อพนักงาน', {back:()=>go('home')}));
  const c = document.createElement('div'); c.className='content';
  const emojis = ['👋','✨','🌸','🔥','🍀'];
  c.innerHTML = `
    <p style="font-size:14px; font-weight:600; margin:0 0 2px;">วันนี้ใครจะมาเช็คสต๊อก? 🙋</p>
    <p style="font-size:12px; color:var(--text-tertiary); margin:0 0 16px;">แตะเลือกชื่อตัวเองได้เลย</p>
    ${STAFF.map((s,i)=>{
      const col = iconColor(i);
      return `<div class="pick-row staff-pick" data-name="${s.name}">
        <div class="pick-avatar" style="background:${col.bg};"><i class="ti ti-user" style="font-size:20px; color:${col.fg};" aria-hidden="true"></i></div>
        <p style="margin:0; font-size:15px; font-weight:600; flex:1;">${s.name}</p>
        <span style="font-size:17px;">${emojis[i % emojis.length]}</span>
      </div>`;
    }).join('')}
  `;
  app.appendChild(c);
  c.querySelectorAll('.staff-pick').forEach(el=> el.onclick = ()=>go('supplierList', {staffName: el.dataset.name}));
}

/* ============ STAFF: supplier list (all suppliers always shown) ============ */
async function renderSupplierList(app){
  let statusList;
  if(stockStatusCache){
    statusList = stockStatusCache;
  } else {
    renderLoading(app, 'กำลังโหลดสถานะร้าน...');
    try{ statusList = await getStockStatus(); }
    catch(err){ app.innerHTML = `<div class="empty-state" style="color:var(--danger);">โหลดสถานะไม่สำเร็จ: ${err.message}</div>`; return; }
  }

  checkedProducts = new Set(statusList.filter(s=>s.checked).map(s=>s.productId));
  checkedSuppliers = new Set(
    SUPPLIERS.filter(s=>{
      const prods = PRODUCTS.filter(p=>p.supplierId===s.id);
      return prods.length>0 && prods.every(p=>checkedProducts.has(p.id));
    }).map(s=>s.id)
  );
  sessionCheckedSuppliers.forEach(id => checkedSuppliers.add(id));

  app.innerHTML = '';
  const pending = SUPPLIERS.filter(s=>!checkedSuppliers.has(s.id));
  const done = SUPPLIERS.filter(s=>checkedSuppliers.has(s.id));

  app.appendChild(topbar('เลือกร้านที่จะเช็ค', {back:()=>go('home'), meta:`${done.length} / ${SUPPLIERS.length}`}));
  const c = document.createElement('div'); c.className='content';
  c.innerHTML = `
    <div class="progress-track"><div class="progress-fill" style="width:${SUPPLIERS.length? done.length/SUPPLIERS.length*100:0}%; background:var(--brand);"></div></div>
    <input type="text" id="search" placeholder="ค้นหาชื่อร้าน" style="margin-bottom:14px;">
    <p class="section-label" style="margin-top:0;">ยังไม่เช็ค (${pending.length})</p>
    <div id="pendingList" class="sup-card-grid"></div>
    <p class="section-label">เช็คแล้ว (${done.length}) <i class="ti ti-check" style="font-size:13px; vertical-align:-1px;" aria-hidden="true"></i></p>
    <div id="doneList" class="sup-card-grid"></div>
  `;
  app.appendChild(c);

  function renderLists(filter){
    const f = (filter||'').trim();
    const pl = c.querySelector('#pendingList'); const dl = c.querySelector('#doneList');
    pl.innerHTML=''; dl.innerHTML='';
    pending.filter(s=>s.name.includes(f)).forEach((s)=> pl.appendChild(supplierCard(s, false, SUPPLIERS.indexOf(s))));
    done.filter(s=>s.name.includes(f)).forEach((s)=> dl.appendChild(supplierCard(s, true, SUPPLIERS.indexOf(s))));
    if(!pl.children.length) pl.innerHTML = '<p class="empty-state">ไม่พบร้านที่ค้นหา</p>';
  }
  renderLists('');
  c.querySelector('#search').oninput = (e)=>renderLists(e.target.value);
}

function supplierCard(s, isDone, idx){
  const col = iconColor(idx);
  const card = document.createElement('div');
  card.className = 'sup-card' + (isDone?' done':'');
  card.innerHTML = `
    <div class="sup-icon" style="background:${isDone?'var(--bg)':col.bg}; border-color:${isDone?'var(--border-strong)':'var(--text)'};">
      <i class="ti ${isDone?'ti-check':'ti-meat'}" style="font-size:19px; color:${isDone?'var(--text-secondary)':col.fg};" aria-hidden="true"></i>
    </div>
    <p style="margin:0; font-size:13px; font-weight:600; color:${isDone?'var(--text-secondary)':'var(--text)'}; line-height:1.3;">${s.name}</p>
  `;
  card.onclick = ()=>go('supplierCheck', {currentSupplierId: s.id});
  return card;
}

/* ============ STAFF: single-page check (all products, 2-col grid) ============ */
async function renderSupplierCheck(app){
  const sup = SUPPLIERS.find(s=>s.id===state.currentSupplierId);
  const products = PRODUCTS.filter(p=>p.supplierId===sup.id);

  renderLoading(app, 'กำลังโหลดข้อมูลสต๊อกวันนี้...');
  try{
    const statusList = await getStockStatus();
    statusList.filter(s=>products.some(p=>p.id===s.productId)).forEach(s=>{
      Object.entries(s.remain||{}).forEach(([uid,val])=>{ if(val!==null) stockValues[uid]=val; });
      if(s.checked) checkedProducts.add(s.productId);
    });
  }catch(err){
    app.innerHTML = `<div class="empty-state" style="color:var(--danger);">โหลดข้อมูลไม่สำเร็จ: ${err.message}</div>`; return;
  }
  app.innerHTML = '';

  app.appendChild(topbar(sup.name, {back:()=>go('supplierList')}));
  const c = document.createElement('div'); c.className='content';
  const grid = document.createElement('div'); grid.className='prod-grid';
  c.appendChild(grid);

  let photoTargetPid = null;
  const photoInput = document.createElement('input');
  photoInput.type = 'file'; photoInput.accept = 'image/*'; photoInput.capture = 'environment';
  photoInput.style.display = 'none';
  c.appendChild(photoInput);
  photoInput.onchange = async ()=>{
    const file = photoInput.files[0];
    const pid = photoTargetPid;
    photoInput.value = '';
    if(!file || !pid) return;
    try{
      productPhotos[pid] = await compressImage(file, 800, 0.6);
    }catch(err){ alert('ถ่ายรูปไม่สำเร็จ: ' + err.message); }
    renderGrid();
  };

  function renderGrid(){
    grid.innerHTML='';
    products.forEach((p, idx)=>{
      const isChecked = checkedProducts.has(p.id);
      const col = iconColor(idx);
      const card = document.createElement('div');
      card.className = 'prod-card' + (isChecked?' checked':'');
      const photoSrc = productPhotos[p.id] || p.photoUrl; // p.photoUrl: persisted one-time reference photo, once backend supports it
      card.innerHTML = `
        <div class="prod-photo-area${(!photoSrc || ALLOW_PHOTO_RETAKE)?' no-photo':''}" data-pid="${p.id}" style="background:${photoSrc?'transparent':(isChecked?'rgba(255,255,255,0.6)':col.bg)};">
          ${photoSrc
            ? `<img src="${photoSrc}" alt="">`
            : `<div class="photo-placeholder"><i class="ti ti-camera" style="font-size:28px; color:${col.fg};" aria-hidden="true"></i><span>แตะเพื่อถ่ายรูป</span></div>`}
          ${(photoSrc && ALLOW_PHOTO_RETAKE) ? `<div class="retake-badge"><i class="ti ti-camera" aria-hidden="true"></i></div>` : ''}
          <button class="check-toggle" data-pid="${p.id}" aria-label="ทำเครื่องหมายว่าเช็คแล้ว"><i class="ti ${isChecked?'ti-circle-check-filled':'ti-circle'}" aria-hidden="true"></i></button>
        </div>
        <p class="prod-card-name">${p.name}</p>
        ${p.units.map(u=>`
          <div class="unit-stepper">
            <button class="step-btn minus" data-unit="${u.id}">−</button>
            <input type="number" class="step-input" data-unit="${u.id}" value="${stockValues[u.id]||0}" min="0">
            <button class="step-btn plus" data-unit="${u.id}">+</button>
            <span class="unit-tag">${u.label}</span>
          </div>
        `).join('')}
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.check-toggle').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const pid = btn.dataset.pid;
        if(checkedProducts.has(pid)) checkedProducts.delete(pid); else checkedProducts.add(pid);
        renderGrid(); updateBar();
      };
    });
    grid.querySelectorAll('.prod-photo-area.no-photo').forEach(area=>{
      area.onclick = ()=>{ photoTargetPid = area.dataset.pid; photoInput.click(); };
    });
    grid.querySelectorAll('.minus, .plus').forEach(btn=>{
      btn.onclick = ()=>{
        const uid = btn.dataset.unit;
        const input = grid.querySelector(`.step-input[data-unit="${uid}"]`);
        let v = parseInt(input.value||0,10);
        v = btn.classList.contains('plus') ? v+1 : Math.max(0,v-1);
        input.value = v; stockValues[uid] = v;
      };
    });
    grid.querySelectorAll('.step-input').forEach(inp=>{
      inp.oninput = ()=>{ stockValues[inp.dataset.unit] = Math.max(0, parseInt(inp.value||0,10)); };
    });
  }
  renderGrid();

  const bar = document.createElement('div'); bar.className='stickybar';
  c.appendChild(bar);
  function updateBar(){
    const doneCount = products.filter(p=>checkedProducts.has(p.id)).length;
    bar.innerHTML = `<span><i class="ti ti-list-check" style="font-size:13px; vertical-align:-2px; margin-right:5px;"></i>เช็คแล้ว ${doneCount} จาก ${products.length} รายการ</span>
      <button class="btn-primary btn" id="finishSup">เสร็จเจ้านี้</button>`;
    bar.querySelector('#finishSup').onclick = async ()=>{
      const btn = bar.querySelector('#finishSup');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      const items = products.flatMap(p=>p.units.map(u=>({unitId:u.id, remainQty: stockValues[u.id]||0})));
      const photos = products.filter(p=>productPhotos[p.id]).map(p=>({productId:p.id, photo:productPhotos[p.id]}));
      try{
        await apiPost('saveStock', { staffName: state.staffName, supplierId: sup.id, items, photos });
        patchStockStatusChecked(products, items);
        checkedSuppliers.add(sup.id);
        sessionCheckedSuppliers.add(sup.id);
        saveSessionChecked();
        go('staffDone');
      }catch(err){
        btn.disabled = false; btn.textContent = 'เสร็จเจ้านี้';
        alert('บันทึกไม่สำเร็จ: ' + err.message);
      }
    };
  }
  updateBar();

  app.appendChild(c);
}

/* ============ OWNER: PIN gate ============ */
function renderOwnerPin(app){
  app.appendChild(topbar('ใส่รหัสฝั่งเจ้าของร้าน', {back:()=>go('home')}));
  const c = document.createElement('div'); c.className='content';
  c.innerHTML = `
    <p style="font-size:13px; color:var(--text-secondary); margin:0 0 16px;">กรอกรหัสผ่านเพื่อเข้าฝั่งเจ้าของร้าน</p>
    <input type="password" inputmode="numeric" id="pinInput" maxlength="4" placeholder="••••" style="font-size:22px; text-align:center; letter-spacing:6px; padding:14px;">
    <p id="pinError" style="color:var(--danger); font-size:12px; margin:8px 0 0; min-height:16px; text-align:center;"></p>
  `;
  app.appendChild(c);
  const input = c.querySelector('#pinInput');
  const errEl = c.querySelector('#pinError');
  input.focus();

  let checking = false;
  async function trySubmit(){
    if(checking) return;
    const val = input.value.trim();
    if(val.length < 4) return;
    checking = true;
    input.disabled = true; errEl.textContent = 'กำลังตรวจสอบ...'; errEl.style.color = 'var(--text-secondary)';
    try{
      const res = await apiGet('checkPin', {pin: val});
      if(res && res.valid){ go('ownerMenu'); return; }
      errEl.textContent = 'รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง'; errEl.style.color = 'var(--danger)';
      input.value='';
    }catch(err){
      errEl.textContent = 'ตรวจสอบรหัสไม่สำเร็จ: ' + err.message; errEl.style.color = 'var(--danger)';
    }
    checking = false; input.disabled = false; input.focus();
  }
  input.addEventListener('input', trySubmit);
}

function renderOwnerMenu(app){
  app.appendChild(topbar('ฝั่งเจ้าของร้าน', {back:()=>go('home')}));
  const c = document.createElement('div'); c.className='content';
  c.innerHTML = `
    <div class="nav-tile featured" id="goOrder"><i class="ti ti-shopping-cart" style="font-size:20px; color:var(--brand);"></i>
      <div><p>สั่งของ</p><small>เลือกรายการ + ยอดเสนอสั่ง</small></div></div>
    <div class="nav-tile" id="goStockAnalytics"><i class="ti ti-chart-bar" style="font-size:20px; color:var(--text-secondary);"></i>
      <div><p>สต๊อก & วิเคราะห์</p><small>Dashboard + แนวโน้มการสั่งซื้อ</small></div></div>
  `;
  app.appendChild(c);

}

/* ============ OWNER: merged Dashboard + Analytics ============ */
async function renderOwnerStockAnalytics(app){
  app.appendChild(topbar('สต๊อก & วิเคราะห์', {back:()=>go('ownerMenu')}));
  const c = document.createElement('div'); c.className='content';
  const tabs = document.createElement('div'); tabs.className='tabs';
  tabs.innerHTML = `<div class="tab ${state.ownerTab==='stock'?'active':''}" data-t="stock">สถานะสต๊อก</div>
                     <div class="tab ${state.ownerTab==='analytics'?'active':''}" data-t="analytics">วิเคราะห์การสั่งซื้อ</div>`;
  c.appendChild(tabs);
  const body = document.createElement('div'); body.innerHTML='<p class="empty-state">กำลังโหลด...</p>'; c.appendChild(body);
  app.appendChild(c);

  tabs.querySelectorAll('.tab').forEach(t=> t.onclick = ()=>{ go('ownerStockAnalytics', {ownerTab:t.dataset.t}); });

  try{
    if(state.ownerTab === 'stock'){
      const statusList = await getStockStatus();
      statusList.forEach(s=> Object.entries(s.remain||{}).forEach(([uid,val])=>{ if(val!==null) stockValues[uid]=val; }));
      renderStockTab(body);
    } else {
      const analytics = await apiGet('analytics', {range:'7d'});
      renderAnalyticsTab(body, analytics);
    }
  }catch(err){
    body.innerHTML = `<p class="empty-state" style="color:var(--danger);">โหลดข้อมูลไม่สำเร็จ: ${err.message}</p>`;
  }
}

function renderStockTab(body){
  const allProducts = PRODUCTS.map(p=>{
    const total = p.units.reduce((sum,u)=> sum + (stockValues[u.id]||0), 0);
    return {...p, total, empty: total===0};
  });
  const total = allProducts.length;
  const empty = allProducts.filter(p=>p.empty).length;

  body.innerHTML = `<div class="metric-grid">
      <div class="metric"><p>สินค้าทั้งหมด</p><p>${total}</p></div>
      <div class="metric" style="background:var(--green-bg);"><p style="color:var(--green);">ยังมี</p><p style="color:var(--green);">${total-empty}</p></div>
      <div class="metric" style="background:var(--amber-bg);"><p style="color:var(--amber);">หมด</p><p style="color:var(--amber);">${empty}</p></div>
    </div>
    <input type="text" id="search" placeholder="ค้นหาชื่อสินค้า" style="margin-bottom:10px;">
    <div id="tableWrap"></div>`;
  const tableWrap = body.querySelector('#tableWrap');

  function renderTable(filter){
    tableWrap.innerHTML='';
    SUPPLIERS.forEach(s=>{
      const items = allProducts.filter(p=>p.supplierId===s.id && p.name.includes(filter||''));
      if(!items.length) return;
      const col = NEUTRAL_COL;
      const head = document.createElement('div'); head.className='sup-header';
      head.style.background = col.bg; head.style.color = col.text; head.style.borderColor = col.text;
      head.innerHTML = `<span>${s.name}</span>`;
      tableWrap.appendChild(head);
      const tbl = document.createElement('table'); tbl.style.width='100%'; tbl.style.fontSize='13px'; tbl.style.marginBottom='10px';
      tbl.innerHTML = items.map(p=>`<tr style="border-bottom:1px solid var(--border);">
          <td style="padding:7px 4px;">${p.name}</td>
          <td style="padding:7px 4px; text-align:right;">${p.units.map(u=>`${stockValues[u.id]||0} ${u.label}`).join(' / ')}</td>
          <td style="padding:7px 4px; text-align:right; width:55px;">${p.empty? '<span class="badge" style="background:var(--amber-mid); color:#412402;">หมด</span>' : '<span style="color:var(--text-secondary); font-size:12px;">ยังมี</span>'}</td>
        </tr>`).join('');
      tableWrap.appendChild(tbl);
    });
  }
  renderTable('');
  body.querySelector('#search').oninput = (e)=>renderTable(e.target.value);
}

/* ============ OWNER: Order page (accordion, grouped by supplier) ============ */
async function renderOrderPage(app){
  app.appendChild(topbar('สั่งของ', {back:()=>go('ownerMenu')}));
  const c = document.createElement('div'); c.className='content';
  c.innerHTML = '<p class="empty-state">กำลังโหลดยอดเสนอสั่ง...</p>';
  app.appendChild(c);

  let statusList;
  try{
    const [forecastList, sl] = await Promise.all([apiGet('orderForecast'), getStockStatus()]);
    statusList = sl;
    FORECASTS = {}; forecastList.forEach(f=> FORECASTS[f.productId] = f);
    statusList.forEach(s=> Object.entries(s.remain||{}).forEach(([uid,val])=>{ if(val!==null) stockValues[uid]=val; }));
  }catch(err){
    c.innerHTML = `<p class="empty-state" style="color:var(--danger);">โหลดข้อมูลไม่สำเร็จ: ${err.message}</p>`;
    return;
  }
  const statusByProduct = {}; statusList.forEach(s=> statusByProduct[s.productId] = s.checked);

  c.innerHTML = `<div id="stats" class="stat-strip"></div>
    <div style="display:flex; gap:8px; margin-bottom:12px;">
      <input type="text" id="search" placeholder="ค้นหาชื่อสินค้าหรือชื่อเจ้า" style="flex:1;">
    </div>
    <div id="groups"></div>`;
  const statsEl = c.querySelector('#stats');
  const groups = c.querySelector('#groups');
  const bar = document.createElement('div'); bar.className='stickybar';
  c.appendChild(bar);

  const expandedSuppliers = new Set();

  function forecast(p){
    return FORECASTS[p.id] ? FORECASTS[p.id].forecast : 0;
  }

  function supplierStats(s){
    const items = PRODUCTS.filter(p=>p.supplierId===s.id);
    const checkedCount = items.filter(p=>statusByProduct[p.id]).length;
    const needOrderItems = items.filter(p=>forecast(p) > 0);
    return { items, checkedCount, needOrderItems };
  }

  function renderStats(){
    const withItems = SUPPLIERS.filter(s=> PRODUCTS.some(p=>p.supplierId===s.id));
    let checkedSuppliers = 0, needOrderSuppliers = 0, orderedOfNeeded = 0;
    withItems.forEach(s=>{
      const { items, checkedCount, needOrderItems } = supplierStats(s);
      const fullyChecked = items.length > 0 && checkedCount === items.length;
      if(fullyChecked) checkedSuppliers++;
      if(fullyChecked && needOrderItems.length){
        needOrderSuppliers++;
        if(orderedSuppliers.has(s.id)) orderedOfNeeded++;
      }
    });
    statsEl.innerHTML = `
      <div class="stat-card"><div class="n">${withItems.length}</div><div class="lbl">เจ้าทั้งหมด</div></div>
      <div class="stat-card green"><div class="n">${checkedSuppliers}</div><div class="lbl">เช็คสต๊อกแล้ว</div></div>
      <div class="stat-card danger"><div class="n">${needOrderSuppliers}</div><div class="lbl">ต้องสั่งของ</div></div>
      <div class="stat-card amber"><div class="n">${orderedOfNeeded}/${needOrderSuppliers}</div><div class="lbl">สั่งแล้ว</div></div>
    `;
  }

  function renderGroups(filter){
    groups.innerHTML='';
    SUPPLIERS.forEach(s=>{
      const allItems = PRODUCTS.filter(p=>p.supplierId===s.id);
      if(!allItems.length) return;
      const items = allItems.filter(p=>p.name.includes(filter||'') || s.name.includes(filter||''));
      if(!items.length) return;

      const { checkedCount, needOrderItems } = supplierStats(s);
      const isOrdered = orderedSuppliers.has(s.id);
      const fullyChecked = allItems.length > 0 && checkedCount === allItems.length;
      const open = expandedSuppliers.has(s.id);

      const card = document.createElement('div'); card.className = 'ord-card' + (open?' open':'');
      let statusBadge;
      // "ต้องสั่ง N รายการ" only means something once the supplier is fully checked today —
      // before that, forecast() treats unchecked stock as 0, so it would falsely flag almost every item.
      if(!fullyChecked) statusBadge = `<span class="badge pending">รอเช็คสต๊อก</span>`;
      else if(needOrderItems.length && isOrdered) statusBadge = `<span class="badge ordered">สั่งแล้ว ✓</span>`;
      else if(needOrderItems.length) statusBadge = `<span class="badge needorder">ต้องสั่ง ${needOrderItems.length} รายการ</span>`;
      else statusBadge = `<span class="badge noorder">ของพอ ไม่ต้องสั่ง</span>`;

      const head = document.createElement('div'); head.className = 'ord-card-head';
      head.innerHTML = `
        <i class="ti ti-chevron-down chev"></i>
        <span class="ord-card-name">${s.name}</span>
        <div class="sup-badges">
          <span class="badge ${checkedCount===allItems.length?'checked':'unchecked'}">เช็คแล้ว ${checkedCount}/${allItems.length}</span>
          ${statusBadge}
        </div>
      `;
      head.onclick = ()=>{
        if(expandedSuppliers.has(s.id)) expandedSuppliers.delete(s.id); else expandedSuppliers.add(s.id);
        renderGroups(c.querySelector('#search').value);
      };
      card.appendChild(head);

      const body = document.createElement('div'); body.className = 'ord-card-body';

      const allSelected = items.length > 0 && items.every(p=> (state.orderQty[p.id] ?? 0) > 0);
      const selectRow = document.createElement('div'); selectRow.className = 'select-all-row';
      selectRow.innerHTML = `<button type="button" class="link-btn" data-selecttoggle>${allSelected ? 'ไม่เลือกเลย' : 'เลือกทั้งหมด'}</button>`;
      selectRow.querySelector('[data-selecttoggle]').onclick = ()=>{
        if(allSelected) items.forEach(p=> state.orderQty[p.id] = 0);
        else items.forEach(p=>{ state.orderQty[p.id] = state.orderQty[p.id] > 0 ? state.orderQty[p.id] : (forecast(p) || 1); });
        renderGroups(c.querySelector('#search').value);
      };
      body.appendChild(selectRow);

      const groupBox = document.createElement('div'); groupBox.className='acc-group'; groupBox.style.borderRadius='0'; groupBox.style.border='none';

      items.forEach(p=>{
        // Nothing is pre-selected: staff work supplier-by-supplier and use
        // "เลือกทั้งหมด" per card once they're ready to order that supplier.
        if(state.orderQty[p.id]===undefined) state.orderQty[p.id] = 0;
        const f = forecast(p);
        const qty = state.orderQty[p.id];
        const fc = FORECASTS[p.id] || {};
        const isLow = fullyChecked && f > 0;
        const remainUnit = fc.unitLabel || p.orderUnit;
        const remainDisplay = fullyChecked
          ? `${fc.currentStock ?? 0}<span class="u">${remainUnit}</span>`
          : '–';

        const row = document.createElement('div');
        row.className = 'prow' + (isLow?' low':'');
        row.innerHTML = `
          <div class="prow-top">
            <input type="checkbox" ${qty>0?'checked':''} data-check="${p.id}">
            <div class="prow-name">${p.name}</div>
          </div>
          <div class="prow-bottom">
            <div class="stat${isLow?' danger':''}"><span class="lbl">คงเหลือ</span><span class="v ${isLow?'':'muted'}">${remainDisplay}</span></div>
            <div class="stat${isLow?' danger':''}"><span class="lbl">ขั้นต่ำ</span><span class="v ${isLow?'':'muted'}">${p.safetyStock}<span class="u">${p.orderUnit}</span></span></div>
            <div class="stat${isLow?' danger':''}"><span class="lbl">เสนอสั่ง</span><span class="v">${f}<span class="u">${p.orderUnit}</span></span></div>
            <div class="stepper">
              <button type="button" data-step="-1">−</button>
              <input type="number" class="stepper-input" value="${qty}" min="0" step="1" data-qty="${p.id}">
              <button type="button" data-step="1">+</button>
            </div>
          </div>
        `;
        groupBox.appendChild(row);

        const qtyInput = row.querySelector(`[data-qty="${p.id}"]`);
        function setQty(v){
          state.orderQty[p.id] = Math.max(0, Math.round(v));
          qtyInput.value = state.orderQty[p.id];
          row.querySelector('[data-check]').checked = state.orderQty[p.id] > 0;
          updateBar();
        }
        row.querySelector('[data-check]').onchange = (e)=>{
          setQty(e.target.checked ? (f || 1) : 0);
        };
        qtyInput.oninput = (e)=> setQty(parseFloat(e.target.value||0));
        row.querySelectorAll('[data-step]').forEach(btn=>{
          btn.onclick = ()=> setQty(state.orderQty[p.id] + Number(btn.dataset.step));
        });
      });
      body.appendChild(groupBox);

      if(needOrderItems.length){
        const btnRow = document.createElement('div'); btnRow.className = 'sup-order-btn-row';
        const btn = document.createElement('button');
        btn.className = 'btn btn-primary'; btn.style.fontSize='12px'; btn.style.padding='6px 10px';
        btn.textContent = isOrdered ? 'สั่งของเจ้านี้อีกครั้ง' : `สั่งของเจ้านี้ (${needOrderItems.length} รายการ)`;
        btn.onclick = async (e)=>{
          e.stopPropagation();
          const supItems = allItems.filter(p=> (state.orderQty[p.id] ?? 0) > 0).map(p=>{
            const fc = FORECASTS[p.id] || {};
            return { productId:p.id, forecast: fc.forecast||0, orderQty: state.orderQty[p.id], rateUsed: fc.rateUsed||1, orderUnit: p.orderUnit };
          });
          if(!supItems.length){ alert('ยังไม่ได้เลือกรายการที่จะสั่งของเจ้านี้'); return; }
          btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
          try{
            await apiPost('createOrderBatch', { items: supItems });
            orderedSuppliers.add(s.id); saveSessionOrdered();
            renderStats();
            renderGroups(c.querySelector('#search').value);
          }catch(err){
            btn.disabled = false; btn.textContent = 'สั่งของเจ้านี้';
            alert('บันทึก OrderLogs ไม่สำเร็จ: ' + err.message);
          }
        };
        btnRow.appendChild(btn);
        body.appendChild(btnRow);
      }

      card.appendChild(body);
      groups.appendChild(card);
    });
    if(!groups.children.length) groups.innerHTML = '<p class="empty-state">ไม่พบสินค้าที่ค้นหา</p>';
    updateBar();
  }

  function updateBar(){
    const n = Object.values(state.orderQty).filter(v=>v>0).length;
    bar.innerHTML = `<span>เลือกแล้ว ${n} รายการ</span><button class="btn-primary btn" id="genMsg" ${n===0?'disabled':''}>สร้างข้อความสั่งของทั้งหมด</button>`;
    bar.querySelector('#genMsg').onclick = async (e)=>{
      const btn = e.target; btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      const items = Object.entries(state.orderQty).filter(([id,q])=>q>0).map(([id,q])=>{
        const f = FORECASTS[id] || {};
        const p = PRODUCTS.find(x=>x.id===id);
        return { productId:id, forecast: f.forecast||0, orderQty:q, rateUsed: f.rateUsed||1, orderUnit: p.orderUnit };
      });
      try{
        await apiPost('createOrderBatch', { items });
        const suppliersInBatch = new Set(items.map(it=> PRODUCTS.find(p=>p.id===it.productId)?.supplierId));
        suppliersInBatch.forEach(sid=> sid && orderedSuppliers.add(sid));
        saveSessionOrdered();
        go('orderMessage');
      }catch(err){
        btn.disabled = false; btn.textContent = 'สร้างข้อความสั่งของทั้งหมด';
        alert('บันทึก OrderLogs ไม่สำเร็จ: ' + err.message);
      }
    };
  }

  renderStats();
  renderGroups('');
  c.querySelector('#search').oninput = (e)=>{ renderStats(); renderGroups(e.target.value); };
}

/* ============ OWNER: Order message ============ */
function renderOrderMessage(app){
  app.appendChild(topbar('สร้างข้อความสั่งของ', {back:()=>go('orderPage')}));
  const c = document.createElement('div'); c.className='content';

  const items = Object.entries(state.orderQty).filter(([id,q])=>q>0).map(([id,q])=>({...PRODUCTS.find(p=>p.id===id), qty:q}));
  const bySupplier = {};
  items.forEach(it=>{ (bySupplier[it.supplierId] = bySupplier[it.supplierId]||[]).push(it); });

  if(!Object.keys(bySupplier).length){
    c.innerHTML = '<p class="empty-state">ยังไม่มีรายการที่เลือกสั่ง กลับไปหน้าสั่งของก่อนนะครับ</p>';
    app.appendChild(c); return;
  }

  Object.entries(bySupplier).forEach(([supId, list])=>{
    const sup = SUPPLIERS.find(s=>s.id===supId);
    const col = NEUTRAL_COL;
    const maxLen = Math.max(...list.map(i=>i.name.length));
    const lines = list.map((it,i)=>{
      const dots = '.'.repeat(Math.max(3, (maxLen - it.name.length) + 8));
      return `${i+1}. ${it.name}${dots}${it.qty} ${it.orderUnit}`;
    }).join('\n');
    const todayLabel = new Date().toLocaleDateString('th-TH', {year:'numeric', month:'short', day:'numeric'});
    const text = `สั่งสินค้า\nร้านซามูไร ไส้กรอก ตลาดเวิลด์มาเก็ต ทวีวัฒนา\nวันที่สั่ง: ${todayLabel}\n\nรายการสั่งของ\n${lines}`;

    const card = document.createElement('div');
    card.style.background='#fff'; card.style.border='1px solid var(--border)';
    card.style.borderLeft = `3px solid ${col.text}`; card.style.borderRadius='0 var(--radius-lg) var(--radius-lg) 0'; card.style.padding='14px'; card.style.marginBottom='12px';
    card.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <p style="margin:0; font-weight:600; font-size:14px;">${sup.name}</p>
        <button class="btn copy-btn" style="font-size:12px; padding:6px 10px;"><i class="ti ti-copy" style="font-size:13px;"></i> คัดลอก</button>
      </div>
      <pre style="font-family:inherit; font-size:12px; line-height:1.7; margin:0; background:var(--bg); padding:10px; border-radius:8px; white-space:pre-wrap;">${text}</pre>
    `;
    card.querySelector('.copy-btn').onclick = ()=>{
      navigator.clipboard?.writeText(text).catch(()=>{});
      const toast = document.createElement('div'); toast.className='copy-toast'; toast.textContent='คัดลอกแล้ว';
      document.body.appendChild(toast); setTimeout(()=>toast.remove(), 1400);
    };
    c.appendChild(card);
  });
  app.appendChild(c);
}

bootstrap();
</script>
